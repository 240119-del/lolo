<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой облачный проект</title>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      padding: 50px;
      background-color: #f4f4f9;
    }
    .form-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      width: 300px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h3>Отправить заявку</h3>

  <form id="feedbackForm">
    <input type="text" id="userName" placeholder="Ваше имя" required>
    <input type="email" id="userEmail" placeholder="Ваш Email" required>
    <button type="submit">Отправить</button>
  </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "ВСТАВЬ_СЮДА",
    authDomain: "ВСТАВЬ_СЮДА",
    projectId: "ВСТАВЬ_СЮДА",
    storageBucket: "ВСТАВЬ_СЮДА",
    messagingSenderId: "ВСТАВЬ_СЮДА",
    appId: "ВСТАВЬ_СЮДА"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("userName").value;
    const email = document.getElementById("userEmail").value;

    try {
      await addDoc(collection(db, "requests"), {
        name: name,
        email: email,
        timestamp: new Date()
      });

      alert("Данные отправлены!");
    } catch (error) {
      alert("Ошибка!");
      console.error(error);
    }
  });
</script>

</body>
</html>
